            grid.innerHTML = filtered.map(site => {
                const labels = { cnki: "知网系", wanfang: "万方/维普", platform: "综合平台", english: "英文查重", jiangchong: "降重工具", aigc: "AIGC检测" };
                return '<div class="card">' +
                    '<span class="card-category ' + site.catClass + '">' + (labels[site.category] || site.category) + '</span>' +
                    '<h3 class="card-title">' + site.name + '</h3>' +
                    '<p class="card-desc">' + site.desc + '</p>' +
                    '<div class="card-quota">' + site.quota + '</div>' +
                    '<a href="' + site.url + '" target="_blank" rel="noopener noreferrer" class="card-btn">去查重</a>' +
                '</div>';
            }).join("");
        }

        searchInput.addEventListener("input", function(e) {
            searchQuery = e.target.value;
            renderCards();
        });

        tags.forEach(function(tag) {
            tag.addEventListener("click", function() {
                tags.forEach(function(t) { t.classList.remove("active"); });
                tag.classList.add("active");
                activeCategory = tag.dataset.cat;
                renderCards();
            });
        });

        renderCards();
    </script>

    
</body>
</html>
